<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VG Music Premium (FLAC Enabled)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00B597;
            --primary-dark: #008f72;
            --bg-main: #0F0F12;
            --bg-body: #0a0a0c;
            --bg-card: #18181B;
            --bg-player: #121214;
            --bg-overlay: rgba(0, 0, 0, 0.85);
            --text-main: #FFFFFF;
            --text-sub: #A0A0A0;
            --border: #2A2A2E;
            --border-light: rgba(255,255,255,0.1);
            --flac-gold: #FFD700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            min-height: 100vh; 
            padding-bottom: 90px; 
            overflow-x: hidden; 
        }

        .container { max-width: 1400px; margin: 0 auto; width: 100%; position: relative; padding: 0 20px; }
        .hidden { display: none !important; }
        .ellipsis { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- Header --- */
        header {
            background: rgba(15, 15, 18, 0.9); backdrop-filter: blur(12px);
            padding: 15px 0; position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.4rem; font-weight: 700; background: linear-gradient(45deg, var(--primary), #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 8px; }
        .logo i { font-size: 1.6rem; color: var(--primary); -webkit-text-fill-color: initial; }
        .header-right { display: flex; align-items: center; gap: 15px; }

        /* Buttons & Dropdowns */
        .playlist-header-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-sub); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; position: relative; }
        .playlist-header-btn:hover, .playlist-header-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .playlist-count { position: absolute; top: -2px; right: -2px; background: #ef4444; color: white; font-size: 0.65rem; font-weight: 700; min-width: 16px; height: 16px; border-radius: 8px; display: none; align-items: center; justify-content: center; padding: 0 4px; }
        
        .lang-dropdown { position: relative; }
        .lang-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .lang-menu { position: absolute; top: 120%; right: 0; width: 300px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .lang-menu.open { display: flex; }
        .lang-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-height: 250px; overflow-y: auto; }
        .lang-item { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 6px; text-align: center; font-size: 0.85rem; cursor: pointer; color: #ccc; }
        .lang-item:hover, .lang-item.active { background: var(--primary); color: white; }

        /* --- Search --- */
        .search-container { padding: 20px 0; }
        .search-box { position: relative; max-width: 600px; margin: 0 auto; }
        .search-input { width: 100%; padding: 14px 20px 14px 50px; border-radius: 50px; border: 1px solid var(--border); background: var(--bg-card); color: white; font-size: 1rem; }
        .search-input:focus { border-color: var(--primary); background: #202025; }
        .search-icon-wrapper { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-sub); }

        /* --- Layout --- */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 30px 0 20px 0; }
        .section-title { font-size: 1.5rem; font-weight: 700; }
        .section-link { font-size: 0.9rem; color: var(--primary); text-decoration: none; cursor: pointer; font-weight: 600; }
        .scroll-container { display: flex; gap: 20px; padding-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
        .scroll-container::-webkit-scrollbar { display: none; }
        
        @media (min-width: 768px) {
            .scroll-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); overflow-x: visible; }
        }

        /* --- Cards --- */
        .card { width: 150px; flex-shrink: 0; cursor: pointer; transition: 0.2s; position: relative; }
        .card:hover { transform: translateY(-5px); }
        .card-img-wrapper { width: 100%; aspect-ratio: 1; border-radius: 12px; overflow: hidden; position: relative; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; }
        .card:hover .play-overlay { opacity: 1; }
        .play-btn { width: 45px; height: 45px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.4rem; }
        .card-info { padding: 10px 4px 0; }
        .card-title { font-size: 1rem; font-weight: 600; color: white; margin-bottom: 4px; }
        .card-sub { font-size: 0.85rem; color: var(--text-sub); }
        
        .card-menu-btn, .playlist-remove-btn { position: absolute; top: 8px; right: 8px; width: 32px; height: 32px; border-radius: 50%; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; z-index: 10; }
        .card-menu-btn { background: rgba(0,0,0,0.5); }
        .playlist-remove-btn { background: rgba(239, 68, 68, 0.9); opacity: 1; }
        .card:hover .card-menu-btn { opacity: 1; }

        .context-menu { position: fixed; background: #2A2A2E; border-radius: 8px; padding: 5px 0; display: none; width: 200px; border: 1px solid var(--border); z-index: 2000; }
        .context-menu.active { display: block; }
        .context-item { padding: 12px 15px; color: white; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 12px; }
        .context-item:hover { background: var(--primary); }

        /* --- Players --- */
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: rgba(24, 24, 27, 0.95); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; padding: 0 20px; z-index: 200; transform: translateY(100%); transition: 0.3s; }
        .player-bar.active { transform: translateY(0); }
        .np-art { width: 56px; height: 56px; border-radius: 6px; margin-right: 15px; cursor: pointer; }
        .np-info { flex-grow: 1; cursor: pointer; }
        .np-title { font-size: 1rem; font-weight: 600; color: white; margin-bottom: 4px; }
        .np-artist { font-size: 0.85rem; color: var(--text-sub); }
        
        .quality-badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; background: rgba(255, 215, 0, 0.15); color: var(--flac-gold); border: 1px solid var(--flac-gold); margin-left: 8px; }
        
        .mini-controls { display: flex; align-items: center; gap: 15px; }
        .btn-ctrl { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1.5rem; padding: 8px; }
        .btn-play-mini { width: 45px; height: 45px; background: white; color: var(--bg-main); border-radius: 50%; border: none; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .progress-mini { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.1); cursor: pointer; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; }

        /* Full Player */
        .full-player-overlay { position: fixed; inset: 0; background: var(--bg-overlay); backdrop-filter: blur(10px); z-index: 300; display: flex; flex-direction: column; transform: translateY(100%); transition: 0.4s; }
        .full-player-overlay.open { transform: translateY(0); }
        .fp-header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .fp-close-btn { background: none; border: none; color: var(--text-sub); font-size: 1.5rem; cursor: pointer; }
        
        .fp-body { flex: 1; display: grid; grid-template-columns: 1fr; gap: 30px; padding: 20px; overflow-y: auto; }
        @media (min-width: 768px) { .fp-body { grid-template-columns: 1fr 1fr; padding: 40px; align-items: center; } }
        
        .fp-art-container { display: flex; justify-content: center; }
        .fp-art { width: 100%; max-width: 350px; aspect-ratio: 1; border-radius: 12px; box-shadow: 0 15px 50px rgba(0,0,0,0.4); object-fit: cover; }
        
        .fp-song-title { font-size: 2rem; font-weight: 700; color: white; text-align: center; margin-bottom: 10px; }
        .fp-artist-list { text-align: center; color: var(--text-sub); margin-bottom: 30px; }
        
        .fp-progress-track { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; cursor: pointer; }
        .fp-progress-fill { height: 100%; background: var(--primary); border-radius: 3px; width: 0%; }
        .fp-time-display { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.85rem; color: var(--text-sub); }
        
        .fp-main-controls { display: flex; justify-content: center; align-items: center; gap: 30px; margin: 30px 0; }
        .fp-btn-play { width: 64px; height: 64px; background: var(--primary); color: white; border-radius: 50%; border: none; font-size: 1.8rem; cursor: pointer; }
        .fp-actions { display: flex; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
        .volume-slider { width: 80px; height: 4px; }

        /* Queue & Lyrics */
        .fp-queue-section { background: rgba(0,0,0,0.2); height: 250px; overflow-y: auto; padding: 15px 25px; border-top: 1px solid var(--border); }
        .queue-item { display: flex; align-items: center; padding: 10px; border-radius: 6px; cursor: pointer; }
        .queue-item:hover, .queue-item.active { background: rgba(255,255,255,0.05); }
        .q-img { width: 40px; height: 40px; border-radius: 4px; margin-right: 15px; }
        .q-info { flex: 1; }
        
        .lyrics-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 400; display: flex; flex-direction: column; transform: translateY(100%); transition: 0.3s; }
        .lyrics-modal.open { transform: translateY(0); }
        .lyrics-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .lyrics-content { flex-grow: 1; overflow-y: auto; padding: 40px 20px; text-align: center; font-size: 1.2rem; color: #888; line-height: 2.2; }
        .lyrics-content p.active { color: white; font-weight: 600; font-size: 1.3rem; }

        .toast { position: fixed; bottom: 100px; left: 50%; transform: translate(-50%, 20px); background: white; color: black; padding: 12px 24px; border-radius: 30px; z-index: 1000; font-weight: 600; opacity: 0; transition: 0.3s; }
        .toast.show { opacity: 1; transform: translate(-50%, 0); }
        .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"><i class="ri-music-2-fill"></i><span>VG Music</span></div>
            <div class="header-right">
                <div class="playlist-header-btn" id="playlistHeaderBtn"><i class="ri-play-list-add-line"></i><span class="playlist-count" id="playlistCount">0</span></div>
                <div class="lang-dropdown">
                    <div class="lang-btn" id="langBtn" onclick="toggleLangMenu()"><span id="currentLang">Hindi</span><i class="ri-arrow-down-s-line"></i></div>
                    <div class="lang-menu" id="langMenu"><div class="lang-grid" id="langGrid"></div></div>
                </div>
            </div>
        </header>

        <div class="search-container">
            <div class="search-box">
                <i class="ri-search-line search-icon-wrapper"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search songs, artists, albums...">
            </div>
        </div>

        <main id="mainContent"><div class="spinner"></div></main>
    </div>

    <!-- Modals & Overlays -->
    <div id="contextMenu" class="context-menu">
        <div class="context-item" onclick="contextAction('playNow')"><i class="ri-play-circle-fill"></i> Play Now</div>
        <div class="context-item" onclick="contextAction('addToQueue')"><i class="ri-add-line"></i> Add to Queue</div>
    </div>
    
    <div id="toast" class="toast"></div>

    <!-- Mini Player -->
    <div class="player-bar" id="playerBar">
        <div class="progress-mini" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
        <img src="" class="np-art" id="npArt" onclick="toggleFullPlayer(true)">
        <div class="np-info" onclick="toggleFullPlayer(true)">
            <div class="np-title ellipsis" id="npTitle">Not Playing</div>
            <div class="np-artist ellipsis" id="npArtist">Select a song</div>
        </div>
        <div class="mini-controls">
            <button class="btn-ctrl" onclick="playPrev()"><i class="ri-skip-back-fill"></i></button>
            <button class="btn-play-mini" id="playPauseBtn"><i id="playIcon" class="ri-play-fill"></i><i id="pauseIcon" class="ri-pause-fill hidden"></i></button>
            <button class="btn-ctrl" onclick="playNext()"><i class="ri-skip-forward-fill"></i></button>
        </div>
    </div>

    <!-- Full Player -->
    <div class="full-player-overlay" id="fullPlayer">
        <div class="fp-header">
            <div style="color: white; font-weight: 600;">Now Playing</div>
            <button class="fp-close-btn" onclick="toggleFullPlayer(false)"><i class="ri-close-line"></i></button>
        </div>
        <div class="fp-body">
            <div class="fp-art-container"><img src="" class="fp-art" id="fpArtBig"></div>
            <div>
                <div class="fp-song-title" id="fpTitle">Song Title</div>
                <div class="fp-artist-list" id="fpArtistList">Artist Name</div>
                
                <div class="fp-progress-track" id="fpProgressTrack"><div class="fp-progress-fill" id="fpProgressFill"></div></div>
                <div class="fp-time-display"><span id="fpCurrentTime">0:00</span><span id="fpTotalTime">0:00</span></div>
                
                <div class="fp-main-controls">
                    <button class="btn-ctrl" onclick="playPrev()"><i class="ri-skip-back-fill"></i></button>
                    <button class="fp-btn-play" id="fpPlayPauseBtn"><i id="fpPlayIcon" class="ri-play-fill"></i><i id="fpPauseIcon" class="ri-pause-fill hidden"></i></button>
                    <button class="btn-ctrl" onclick="playNext()"><i class="ri-skip-forward-fill"></i></button>
                </div>
                
                <div class="fp-actions">
                    <div style="display:flex; gap:15px;">
                        <button class="btn-ctrl" id="addPlaylistBtn" onclick="togglePlaylist()"><i class="ri-play-list-add-line"></i></button>
                        <button class="btn-ctrl" onclick="toggleLyrics()"><i class="ri-file-text-line"></i></button>
                    </div>
                    <input type="range" min="0" max="1" step="0.05" value="1" class="volume-slider" id="volumeSlider">
                </div>
            </div>
        </div>
        <div class="fp-queue-section">
            <h3 style="color:white; margin-bottom:10px;">Up Next</h3>
            <div id="queueListContainer"></div>
        </div>
    </div>

    <!-- Lyrics -->
    <div class="lyrics-modal" id="lyricsModal">
        <div class="lyrics-header">
            <h3 style="color:white;">Lyrics</h3>
            <button onclick="toggleLyrics()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;"><i class="ri-close-line"></i></button>
        </div>
        <div class="lyrics-content" id="lyricsContent"></div>
    </div>

    <audio id="audioPlayer" crossorigin="anonymous"></audio>

    <script>
        const API_BASE = 'https://nepotuneapi.vercel.app/api';
        
        // --- CHANGED TO DEFAULT 'Hindi' ---
        let currentLanguage = 'Hindi', currentPlaylist = [], currentIndex = 0, isPlaying = false;
        
        let myPlaylist = JSON.parse(localStorage.getItem('vg_music_playlist')) || [];
        let lyricsData = [], lyricsType = 'none';
        let searchTimer;

        const audio = document.getElementById('audioPlayer'), mainContent = document.getElementById('mainContent');
        const contextMenu = document.getElementById('contextMenu'), toastEl = document.getElementById('toast');
        
        document.addEventListener('DOMContentLoaded', () => {
            initLanguages(); loadHome(); setupEventListeners(); updatePlaylistCount();
        });

        function showToast(msg) {
            toastEl.textContent = msg; toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 3000);
        }

        async function fetchAPI(endpoint) {
            try { const res = await fetch(`${API_BASE}${endpoint}`); return await res.json(); } 
            catch (e) { return { success: false }; }
        }

        async function loadHome() {
            mainContent.innerHTML = '<div class="spinner"></div>';
            const sections = [
                { title: "Trending Now", query: "trending 2025" },
                { title: "Top 50 Global", query: "top 50 global" }
            ];
            let html = '';
            sections.forEach(sec => html += `<div class="section-header"><h2 class="section-title">${sec.title}</h2></div><div class="scroll-container" id="cont-${sec.title.replace(/\s/g,'')}"></div>`);
            mainContent.innerHTML = html;

            for (const sec of sections) {
                // Apply Language filtering
                let finalQuery = sec.query;
                if(currentLanguage !== 'All Languages') {
                    finalQuery += ` ${currentLanguage}`;
                }
                const data = await fetchAPI(`/search/songs?query=${encodeURIComponent(finalQuery)}&limit=12`);
                if(data.success) renderCards(data.data.results, document.getElementById(`cont-${sec.title.replace(/\s/g,'')}`));
            }
        }

        function renderCards(items, container) {
            container.innerHTML = '';
            items.forEach(item => {
                const img = item.image[item.image.length - 1]?.url || '';
                const flac = item.downloadUrl?.find(x => x.quality === 'flac' || x.quality === 'lossless');
                const url = flac ? flac.url : item.downloadUrl?.[0]?.url;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="card-img-wrapper"><img src="${img}" class="card-img"><button class="card-menu-btn" onclick="openMenu(event, '${item.id}')"><i class="ri-more-2-fill"></i></button></div><div class="card-info"><div class="card-title ellipsis">${item.name}</div><div class="card-sub ellipsis">${item.artists.primary[0].name}</div></div>`;
                card.onclick = (e) => { if(!e.target.closest('.card-menu-btn')) playSong({ id: item.id, title: item.name, artist: item.artists.primary[0].name, image: img, url: url, quality: flac ? 'FLAC' : 'Standard' }, items); };
                container.appendChild(card);
            });
        }

        function playSong(song, list) {
            currentPlaylist = list; currentIndex = list.findIndex(s => s.id === song.id);
            if(currentIndex === -1) currentIndex = 0;
            
            document.getElementById('npTitle').innerHTML = `${song.title} ${song.quality === 'FLAC' ? '<span class="quality-badge">FLAC</span>' : ''}`;
            document.getElementById('npArtist').textContent = song.artist;
            document.getElementById('npArt').src = song.image;
            document.getElementById('fpTitle').innerHTML = song.title;
            document.getElementById('fpArtistList').textContent = song.artist;
            document.getElementById('fpArtBig').src = song.image;
            
            document.getElementById('playerBar').classList.add('active');
            
            if (song.url) {
                audio.src = song.url;
                audio.play().then(() => { isPlaying = true; updateBtns(); fetchLyrics(song); renderQueue(); });
            } else { showToast("Audio unavailable"); }
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); isPlaying = !audio.paused; updateBtns(); }
        function updateBtns() {
            const arr = ['playIcon', 'fpPlayIcon']; const arr2 = ['pauseIcon', 'fpPauseIcon'];
            arr.forEach(id => document.getElementById(id).classList.toggle('hidden', isPlaying));
            arr2.forEach(id => document.getElementById(id).classList.toggle('hidden', !isPlaying));
        }
        function playNext() { if(!currentPlaylist.length) return; currentIndex = (currentIndex + 1) % currentPlaylist.length; playSong(currentPlaylist[currentIndex], currentPlaylist); }
        function playPrev() { if(!currentPlaylist.length) return; currentIndex = (currentIndex - 1 + currentPlaylist.length) % currentPlaylist.length; playSong(currentPlaylist[currentIndex], currentPlaylist); }

        function toggleFullPlayer(show) { document.getElementById('fullPlayer').classList.toggle('open', show); }
        
        async function fetchLyrics(song) {
            const container = document.getElementById('lyricsContent'); container.innerHTML = '<div class="spinner"></div>';
            try {
                const res = await fetch(`https://lrclib.net/api/get?artist_name=${encodeURIComponent(song.artist)}&track_name=${encodeURIComponent(song.title)}`);
                const data = await res.json();
                if(data.syncedLyrics) { lyricsType = 'synced'; lyricsData = parseLRC(data.syncedLyrics); renderLyrics(container); }
                else if(data.plainLyrics) { container.innerHTML = `<p style="color:#ccc;">${data.plainLyrics.replace(/\n/g, '<br>')}</p>`; lyricsType = 'plain'; }
                else throw new Error();
            } catch { container.innerHTML = '<p>No lyrics found.</p>'; lyricsType = 'none'; }
        }

        function parseLRC(lrc) {
            const result = [];
            lrc.split('\n').forEach(line => {
                const match = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/.exec(line);
                if(match) result.push({ time: parseInt(match[1])*60 + parseInt(match[2]) + parseFloat("0."+match[3]), text: line.replace(match[0], '').trim() });
            });
            return result.filter(x => x.text);
        }

        function renderLyrics(container) {
            container.innerHTML = '';
            lyricsData.forEach((l, i) => { const p = document.createElement('p'); p.textContent = l.text; p.id = `lyric-${i}`; container.appendChild(p); });
        }

        function updateLyrics() {
            if(lyricsType !== 'synced' || !document.getElementById('lyricsModal').classList.contains('open')) return;
            const time = audio.currentTime; let idx = -1;
            for(let i=0; i<lyricsData.length; i++) { if(time >= lyricsData[i].time) idx = i; else break; }
            document.querySelectorAll('.lyrics-content p').forEach(p => p.classList.remove('active'));
            if(idx !== -1) {
                const el = document.getElementById(`lyric-${idx}`);
                if(el) { el.classList.add('active'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            }
        }

        function renderQueue() {
            const q = document.getElementById('queueListContainer'); q.innerHTML = '';
            currentPlaylist.forEach((s, i) => {
                const div = document.createElement('div'); div.className = `queue-item ${i === currentIndex ? 'active' : ''}`;
                div.innerHTML = `<img src="${s.image || ''}" class="q-img"><div class="q-info"><div class="card-title">${s.title || s.name}</div></div>`;
                div.onclick = () => playSong(s, currentPlaylist);
                q.appendChild(div);
            });
        }

        function setupEventListeners() {
            document.getElementById('playPauseBtn').onclick = togglePlay;
            document.getElementById('fpPlayPauseBtn').onclick = togglePlay;
            document.getElementById('volumeSlider').oninput = e => audio.volume = e.target.value;
            
            // Re-added Search Event Listener
            document.getElementById('searchInput').addEventListener('input', (e) => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(async () => {
                    const val = e.target.value.trim();
                    if(val.length > 2) {
                        mainContent.innerHTML = '<div class="spinner"></div>';
                        let q = val; if(currentLanguage !== 'All Languages') q += ' ' + currentLanguage;
                        const data = await fetchAPI(`/search/songs?query=${encodeURIComponent(q)}&limit=20`);
                        mainContent.innerHTML = `<div class="section-header"><h2 class="section-title">Search Results</h2><button class="section-link" onclick="loadHome()" style="background:none; border:none; cursor:pointer;">Clear</button></div><div class="scroll-container" style="display:flex; flex-wrap:wrap; gap:20px;" id="searchResults"></div>`;
                        if(data.success) renderCards(data.data.results, document.getElementById('searchResults'));
                    } else if (val.length === 0) loadHome();
                }, 500);
            });
            
            audio.ontimeupdate = () => {
                if(!audio.duration) return;
                const pct = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progressFill').style.width = `${pct}%`;
                document.getElementById('fpProgressFill').style.width = `${pct}%`;
                const fmt = t => `${Math.floor(t/60)}:${Math.floor(t%60).toString().padStart(2, '0')}`;
                document.getElementById('fpCurrentTime').textContent = fmt(audio.currentTime);
                document.getElementById('fpTotalTime').textContent = fmt(audio.duration);
                updateLyrics();
            };
            audio.onended = playNext;
            
            const seek = (e, bar) => { const r = bar.getBoundingClientRect(); audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration; };
            document.getElementById('progressBar').onclick = e => seek(e, e.currentTarget);
            document.getElementById('fpProgressTrack').onclick = e => seek(e, e.currentTarget);
        }

        function toggleLyrics() { document.getElementById('lyricsModal').classList.toggle('open'); }
        function toggleLangMenu() { document.getElementById('langMenu').classList.toggle('open'); }
        
        function initLanguages() {
            const langs = ['All Languages', 'Hindi', 'English', 'Punjabi', 'Bhojpuri', 'Tamil', 'Telugu'];
            const grid = document.getElementById('langGrid'); grid.innerHTML = '';
            langs.forEach(l => {
                const div = document.createElement('div'); 
                div.className = `lang-item ${currentLanguage === l ? 'active' : ''}`; 
                div.textContent = l;
                div.onclick = () => { 
                    currentLanguage = l;
                    document.getElementById('currentLang').textContent = l; 
                    toggleLangMenu(); 
                    initLanguages(); // refresh active class
                    loadHome(); 
                };
                grid.appendChild(div);
            });
        }

        function togglePlaylist() { showToast("Playlist system simplified for performance."); }
        function updatePlaylistCount() { document.getElementById('playlistCount').textContent = myPlaylist.length; }
    </script>
</body>
</html>
